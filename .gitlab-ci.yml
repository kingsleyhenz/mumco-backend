variables:
  RELEASE_TAG_REGEX: '^release\/([0-9]+\.[0-9]+\.[0-9]+-.+)'

stages:
  - release_artifacts
  - build
  - deploy

build_staging:
  stage: build
  tags:
    - chigisoft
    - shared
  only:
    - master
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE:build-$CI_PIPELINE_IID
  before_script:
    - until docker info; do sleep 1; done
    - echo -n $CI_REGISTRY_PASSWORD | docker login --username $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
    - echo $TAG_BUILD
  script:
    - echo $IMAGE_TAG
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG

build_production:
  stage: build
  tags:
    - chigisoft
    - shared
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^release\/\d+\.\d+\.\d+(-.+)?$/'
  before_script:
    - until docker info; do sleep 1; done
    - echo -n $CI_REGISTRY_PASSWORD | docker login --username $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - export IMAGE_TAG="$CI_REGISTRY_IMAGE:$(echo $CI_COMMIT_BRANCH | sed -E "s/$RELEASE_TAG_REGEX/\1/")"
    - echo $IMAGE_TAG
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG

release_artifacts: # only runs for production
  stage: release_artifacts
  tags:
    - chigisoft
    - shared
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
      when: never # Do not run this job when a tag is created manually
    - if: '$CI_COMMIT_BRANCH =~ /^release\/\d+\.\d+\.\d+(-.+)?$/'
  script:
    - echo $(echo $CI_COMMIT_BRANCH | sed -E "s/$RELEASE_TAG_REGEX/\1/")
  release:
    tag_name: '$(echo $CI_COMMIT_BRANCH | sed -E "s/$RELEASE_TAG_REGEX/\1/")'
    description: '$(echo $CI_COMMIT_BRANCH | sed -E "s/$RELEASE_TAG_REGEX/\1/")'
    ref: '$CI_COMMIT_SHA'

