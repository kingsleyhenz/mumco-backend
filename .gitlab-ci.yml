deploy_staging:
  stage: deploy
  tags:
    - chigisoft
    - shared
  only:
    - master
  variables:
    IMAGE_TAG: '$CI_REGISTRY_IMAGE:build-$CI_PIPELINE_IID'
  before_script:
    - apk add --no-cache git
  script:
    - git clone https://deploy:${DEPLOYMENT_TOKEN}@${INFRA_REPO} infra
    - cd infra
    - git config user.name "Chigisoft"
    - git config user.email "admin@example.com"
    - sed -i "s|$CI_REGISTRY_IMAGE:[^ ]*|$IMAGE_TAG|g" $STAGING_MANIFEST_PATH
    - cat $MANIFEST_PATH
    - git add .
    - git commit -m "$IMAGE_TAG"
    - git push origin master

deploy_production:
  stage: deploy
  tags:
    - chigisoft
    - shared
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^release\/\d+\.\d+\.\d+(-.+)?$/'
  before_script:
    - apk add --no-cache git
  script:
    - export IMAGE_TAG="$CI_REGISTRY_IMAGE:$(echo $CI_COMMIT_BRANCH | sed -E "s/$RELEASE_TAG_REGEX/\1/")"
    - git clone https://deploy:${DEPLOYMENT_TOKEN}@${INFRA_REPO} infra
    - cd infra
    - git config user.name "Chigisoft"
    - git config user.email "admin@example.com"
    - sed -i "s|$CI_REGISTRY_IMAGE:[^ ]*|$IMAGE_TAG|g" $PROD_MANIFEST_PATH
    - cat $PROD_MANIFEST_PATH
    - git add .
    - git commit -m "$IMAGE_TAG"
    - git push origin master
